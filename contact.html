<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: transparent;
}

/* Overlay interne */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

/* Popup Contact */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
}

/* Close button */
.close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 26px;
    background: none;
    border: none;
    cursor: pointer;
    color: #333;
}

/* Form */
input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    cursor: pointer;
}

/* Confirmation Popup */
.confirmation-popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    text-align: center;
}

.confirmation-popup.active {
    display: block;
}

.confirmation-popup button {
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- Popup Contact -->
<div class="popup" id="contactPopup">
    <button class="close" onclick="parent.closeContact()">✕</button>
    <h2>Contact</h2>

    <form id="contactForm" action="https://formspree.io/f/xnjbywdk" method="POST">
        <input type="text" name="name" placeholder="Ton nom" required>
        <input type="email" name="email" placeholder="Ton email" required>
        <textarea name="message" placeholder="Ton message..." required></textarea>
        <input type="text" name="_gotcha" style="display:none">
        <button type="submit">Envoyer 🚀</button>
    </form>
</div>

<!-- Confirmation Popup -->
<div class="confirmation-popup" id="confirmationPopup">
    <h2>Merci pour ton message !</h2>
    <p>Nous reviendrons vers toi dans les plus brefs délais.</p>
    <button onclick="parent.closeContact()">Fermer</button>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();  // Empêche le formulaire de se soumettre normalement

    // Soumettre les données au serveur Formspree
    const form = document.getElementById("contactForm");
    const data = new FormData(form);

    fetch("https://formspree.io/f/xnjbywdk", {
        method: "POST",
        body: data,
        headers: {
            "Accept": "application/json"
        }
    }).then(response => {
        if (response.ok) {
            // Si l'envoi a réussi, afficher le popup de confirmation
            document.getElementById("contactPopup").style.display = "none";  // Masquer le popup contact
            document.getElementById("confirmationPopup").classList.add("active");  // Afficher le popup de confirmation
        } else {
            alert("Oups, il y a eu un problème. Veuillez réessayer.");
        }
    }).catch(error => {
        console.error("Erreur:", error);
        alert("Une erreur s'est produite. Veuillez réessayer.");
    });
});
</script>

</body>
</html>
