<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: transparent;
}

/* Overlay interne */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

/* Popup */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
}

/* Close button */
.close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 26px;
    background: none;
    border: none;
    cursor: pointer;
    color: black; /* visible sur fond blanc */
}

/* Form */
input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="popup">
    <button class="close" onclick="parent.closeContact()">✕</button>
    <h2>Contact</h2>

    <form onsubmit="sendForm(event)">
        <input type="text" name="name" placeholder="Ton nom" required>
        <input type="email" name="email" placeholder="Ton email" required>
        <textarea name="message" placeholder="Ton message" required></textarea>
        <button type="submit">Envoyer 🚀</button>
    </form>
</div>

<script>
function sendForm(e) {
    e.preventDefault();
    alert("Message envoyé !");
    parent.closeContact();
}
</script>

</body>
</html>
