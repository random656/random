<style>
/* --- Styles identiques à ton précédent code --- */
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding-top: 80px;
}
.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 15px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 18px;
    transition: all 0.3s ease;
}
.btn:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    text-align: center;
    z-index: 10;
}
.bandeau h1 {
    margin: 0;
    color: white;
    font-size: 24px;
}
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s ease;
    z-index: 500;
}
.overlay.active {
    opacity: 1;
    visibility: visible;
}
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: left 0.3s ease;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.sidebar.active {
    left: 0;
}
.sidebar a {
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    display: block;
    transition: 0.3s;
}
.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}
.sidebar .close-btn {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 30px;
    color: white;
    border: none;
    background: none;
    cursor: pointer;
}
.open-btn {
    background: none;
    color: white;
    border: none;
    font-size: 30px;
    cursor: pointer;
    position: absolute;
    left: 20px;
    top: 15px;
}
.color-picker-container {
    padding: 15px;
    text-align: left;
    color: white;
    font-size: 14px;
}
.color-picker-container input {
    width: 100%;
    height: 35px;
    border: none;
    cursor: pointer;
}
#content {
    padding-top: 120px;
}
</style>
</head>

<body>

<header class="bandeau">

        <button class="close-btn" onclick="closeSidebar()">×</button>
        <!-- Lien vers la page principale -->
        <a href="index.html">Bienvenue !</a>
    </div>

    <div class="color-picker-container">
        🎨 Couleur de la sidebar
        <input type="color" id="colorPicker">
    </div>
</div>

<div id="content">

    <a href="https://www.youtube.com" target="_blank" class="btn"><img src="ytb.png" style="width:15px;" alt="YouTube">YTB</a><p></p>
    <a href="https://www.google.com/imgres?q=fuck%20you&imgurl=https%3A%2F%2Fimg.freepik.com%2Fvecteurs-libre%2Fva-te-faire-foutre-symbole-dans-style-bande-dessinee_23-2148684350.jpg%3Fsemt%3Dais_related_payload_trends%26w%3D740%26q%3D80&imgrefurl=https%3A%2F%2Ffr.freepik.com%2Fvecteurs%2Ffuck-you&docid=gPHVC0FCvbeoDM&tbnid=bVZUEmnMq1_61M&vet=12ahUKEwjau57EhPWSAxUcSfEDHZJLJR8QnPAOegQIFhAB..i&w=740&h=740&hcb=2&ved=2ahUKEwjau57EhPWSAxUcSfEDHZJLJR8QnPAOegQIFhAB" target="_blank" class="btn"><img src="pi.png" style="width:15px;" alt="?">???</a><p></p>

    <a href="https://www.poki.com" target="_blank" class="btn"><img src="poki.png" style="width:15px;" alt="Amazon">Ferme la porte y'a la Poki dans l'side</a><p></p>
    <a href="https://www.ikea.fr" target="_blank" class="btn"><img src="ikea.png" style="width:25px;" alt="Ikea">IKEA</a><p></p>

</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const colorPicker = document.getElementById("colorPicker");

function toggleSidebar() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

function closeSidebar() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
}

// Changement de couleur dynamique
colorPicker.addEventListener("input", function() {
    sidebar.style.backgroundColor = this.value;
});
</script>

</body>
</html>
