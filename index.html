<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMN</title>

<link rel="manifest" href="manifest.json">
<meta name="color-scheme" content="light dark">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    color: black;
    margin: 0;
    padding-top: 80px;
    transition: 0.3s;
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center;
}

.bandeau h1 {
    margin: 0;
    color: white;
    font-size: 24px;
}

.open-btn {
    position: absolute;
    left: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* THEME BUTTON */
.theme-btn {
    position: absolute;
    right: 15px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    transition: transform 0.4s;
}

.theme-btn.rotate {
    transform: rotate(360deg) scale(1.2);
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 15px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 18px;
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 1000;
    display: flex;
    flex-direction: column;
}

.sidebar.active {
    left: 0;
}

.sidebar-content {
    display: flex;
    flex-direction: column;
}

.sidebar a {
    padding: 12px 20px;
    color: white;
    text-decoration: none;
    margin-bottom: 5px;
}

.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}

.close-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* COLOR PICKER */
.color-picker-container {
    padding: 15px;
    color: white;
}

.color-picker-container input {
    width: 100%;
    height: 35px;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* POPUP CONTACT */
.contact-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: white;
    padding: 35px;
    border-radius: 25px;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    opacity: 0;
    visibility: hidden;
    transition: 0.35s;
    z-index: 2000;
}

.contact-popup.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

.close-popup {
    position: absolute;
    top: 10px;   /* Positionné en haut à droite */
    right: 15px;
    font-size: 10px;
    background: none;
    border: none;
    color: #333;
    cursor: pointer;
}
.contact-popup input,
.contact-popup textarea {
    width: 100%;
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}
/* Formulaire contact */
.contact-popup input,
.contact-popup textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

.contact-popup textarea {
    resize: none;
    height: 120px;
}

.contact-popup button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    cursor: pointer;
}
/* DARK MODE */
body.dark {
    background-color: #1e1e1e;
    color: white;
}

body.dark .bandeau {
    background-color: #2a2a2a;
}

body.dark .sidebar {
    background-color: #1f1f1f;
}

body.dark .contact-popup {
    background: #2b2b2b;
}
</style>
</head>

<body>

<header class="bandeau">
    <h1>Bienvenue !</h1>
    <button class="open-btn" onclick="toggleSidebar()">☰</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</header>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="sidebar" class="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">×</button>

    <div class="sidebar-content">
        <a href="index.html">Accueil</a>
        <a href="./lesboutons.html">Les boutons</a>
        <a href="videodujour.html">Vidéos</a>
        <a onclick="openContact()">Contact</a>
    </div>

    <div class="color-picker-container">
        🎨 Couleur
        <input type="color" id="colorPicker">
    </div>
</div>

<div id="content">
    <a href="./lesboutons.html" class="btn">LES BOUTONS DE MERDE !</a>
</div>

<!-- POPUP CONTACT -->
<div id="contactPopup" class="contact-popup">
    <button onclick="closeContact()">✕</button>
    <h2>Contact</h2>
    <form id="contactForm">
        <input type="text" placeholder="Nom" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message" required></textarea>
        <button type="submit">Envoyer</button>
    </form>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const popup = document.getElementById("contactPopup");
const themeBtn = document.getElementById("themeBtn");
const colorPicker = document.getElementById("colorPicker");
const form = document.getElementById("contactForm");

/* SIDEBAR */
function toggleSidebar() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

/* CONTACT */
function openContact() {
    sidebar.classList.remove("active");
    popup.classList.add("active");
    overlay.classList.add("active");
}

function closeContact() {
    popup.classList.remove("active");
    overlay.classList.remove("active");
}

function closeAll() {
    sidebar.classList.remove("active");
    closeContact();
}

/* ESC */
document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeAll();
});

/* FORM */
form.addEventListener("submit", e => {
    e.preventDefault();
    alert("Message envoyé !");
    form.reset();
    closeContact();
});

/* THEME */
const savedTheme = localStorage.getItem("theme");

if (savedTheme) {
    document.body.classList.toggle("dark", savedTheme === "dark");
} else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
    document.body.classList.add("dark");
}

themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";

function toggleTheme() {
    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");

    themeBtn.classList.add("rotate");
    setTimeout(() => themeBtn.classList.remove("rotate"), 400);

    themeBtn.textContent = isDark ? "☀️" : "🌙";

    localStorage.setItem("theme", isDark ? "dark" : "light");
}

/* COLOR PICKER */
const savedColor = localStorage.getItem("sidebarColor");

if (savedColor) {
    sidebar.style.backgroundColor = savedColor;
    colorPicker.value = savedColor;
}

colorPicker.addEventListener("input", function() {
    sidebar.style.backgroundColor = this.value;
    localStorage.setItem("sidebarColor", this.value);
});
</script>

</body>
</html>
