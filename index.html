<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMN</title>

<meta name="color-scheme" content="light dark">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    margin: 0;
    padding-top: 80px;
    transition: 0.3s;
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center;
}

.bandeau h1 {
    margin: 0;
    color: white;
    font-size: 24px;
}

/* BUTTONS HEADER */
.open-btn {
    position: absolute;
    left: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

.theme-btn {
    position: absolute;
    right: 15px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* CONTENT */
#content {
    padding-top: 40px;
}

.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 15px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 16px;
    transition: 0.3s;
}

.btn:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 1000;
    display: flex;
    flex-direction: column;
}

.sidebar.active {
    left: 0;
}

.sidebar a {
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    cursor: pointer;
}

.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}

.close-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* COLOR PICKER */
.color-picker-container {
    padding: 15px;
    color: white;
}

.color-picker-container input {
    width: 100%;
    height: 35px;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
    z-index: 1500;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* IFRAME POPUP */
#contactFrame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    z-index: 2000;
}

#contactFrame.active {
    display: block;
}

/* DARK MODE */
body.dark {
    background-color: #1e1e1e;
    color: white;
}

body.dark .bandeau {
    background-color: #2a2a2a;
}

body.dark .sidebar {
    background-color: #1f1f1f;
}
</style>
</head>

<body>

<header class="bandeau">
    <h1>Bienvenue !</h1>
    <button class="open-btn" onclick="toggleSidebar()">☰</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</header>

<div id="overlay" class="overlay" onclick="closeContact()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">×</button>

    <a href="index.html">Bienvenue !</a>
    <a href="lesboutons.html">Les boutons</a>
    <a href="videodujour.html">Vidéos du jour</a>
    <a onclick="openContact()">Contact</a>

    <div class="color-picker-container">
        🎨 Couleur
        <input type="color" id="colorPicker">
    </div>
</div>

<!-- CONTENU -->
<div id="content">
    <a href="lesboutons.html" class="btn">Accéder aux boutons</a>
</div>

<!-- IFRAME POPUP CONTACT -->
<iframe id="contactFrame" src="contact.html"></iframe>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const themeBtn = document.getElementById("themeBtn");
const colorPicker = document.getElementById("colorPicker");
const frame = document.getElementById("contactFrame");

/* SIDEBAR */
function toggleSidebar() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

/* CONTACT */
function openContact() {
    frame.classList.add("active");
    overlay.classList.add("active");
}

function closeContact() {
    frame.classList.remove("active");
    overlay.classList.remove("active");
    sidebar.classList.remove("active");
}

/* ESC */
document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeContact();
});

/* THEME */
const savedTheme = localStorage.getItem("theme");

if (savedTheme) {
    document.body.classList.toggle("dark", savedTheme === "dark");
} else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
    document.body.classList.add("dark");
}

themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";

function toggleTheme() {
    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");
    themeBtn.textContent = isDark ? "☀️" : "🌙";

    localStorage.setItem("theme", isDark ? "dark" : "light");
}

/* SIDEBAR COLOR */
colorPicker.addEventListener("input", function() {
    sidebar.style.backgroundColor = this.value;
});
</script>

</body>
</html>
