<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMN</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DAMN">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#6a7d5e">
<meta name="color-scheme" content="light dark">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    color: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding-top: 80px;
    transition: background 0.3s, color 0.3s;
}

/* BOUTONS */
.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 15px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 18px;
    transition: all 0.3s ease;
}

.btn:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center;
}

.bandeau h1 {
    margin: 0;
    color: white;
    font-size: 24px;
}

.open-btn {
    position: absolute;
    left: 15px;
    background: none;
    color: white;
    border: none;
    font-size: 30px;
    cursor: pointer;
}

/* BOUTON THEME ANIMÉ */
.theme-btn {
    position: absolute;
    right: 15px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    transition: transform 0.4s ease;
}

.theme-btn.rotate {
    transform: rotate(360deg) scale(1.2);
}

.theme-btn:active {
    transform: scale(0.85);
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s ease;
    z-index: 500;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: left 0.3s ease, box-shadow 0.3s;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.sidebar.active {
    left: 0;
    box-shadow: 5px 0 20px rgba(0,0,0,0.4);
}

.sidebar a {
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    color: white;
}

.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}

.sidebar .close-btn {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 30px;
    color: white;
    border: none;
    background: none;
    cursor: pointer;
}

/* POPUP */
.contact-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: white;
    padding: 35px;
    border-radius: 25px;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    opacity: 0;
    visibility: hidden;
    transition: 0.35s;
    z-index: 2000;
}

.contact-popup.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

.contact-popup input,
.contact-popup textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #3a7bd5;
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    transition: 0.4s;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* DARK MODE */
body.dark {
    background-color: #1e1e1e;
    color: #f1f1f1;
}

body.dark .bandeau {
    background-color: #2a2a2a;
}

body.dark .sidebar {
    background-color: #1f1f1f;
}

body.dark .contact-popup {
    background: #2b2b2b;
    color: white;
}

body.dark input,
body.dark textarea {
    background: #1a1a1a;
    color: white;
    border: 1px solid #444;
}

body.dark .toast {
    background: #222;
}
</style>
</head>

<body>

<header class="bandeau">
    <h1>Bienvenue !</h1>
    <button class="open-btn" onclick="toggleSidebar()">☰</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</header>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="sidebar" class="sidebar">
    <button class="close-btn" onclick="closeSidebar()">×</button>
    <a href="#">Bienvenue</a>
    <a href="#">Boutons</a>
    <a href="#">Vidéos</a>
    <a onclick="openContact()">Contact</a>
</div>

<div id="content">
    <a href="#" class="btn">LES BOUTONS DE MERDE !</a>
</div>

<div id="toast" class="toast">✅ Message envoyé</div>

<div id="contactPopup" class="contact-popup">
    <button onclick="closeContact()">✕</button>
    <h2>Contact</h2>
    <form id="contactForm">
        <input type="text" required placeholder="Nom">
        <input type="email" required placeholder="Email">
        <textarea required placeholder="Message"></textarea>
        <button type="submit">Envoyer</button>
    </form>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const popup = document.getElementById("contactPopup");
const form = document.getElementById("contactForm");
const toast = document.getElementById("toast");
const themeBtn = document.getElementById("themeBtn");

/* SIDEBAR */
function toggleSidebar() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

function closeSidebar() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
}

/* CONTACT */
function openContact() {
    popup.classList.add("active");
    overlay.classList.add("active");
}

function closeContact() {
    popup.classList.remove("active");
    overlay.classList.remove("active");
}

function closeAll() {
    closeSidebar();
    closeContact();
}

/* TOAST */
function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
}

/* FORM */
form.addEventListener("submit", function(e) {
    e.preventDefault();
    showToast("✅ Message envoyé !");
    form.reset();
    closeContact();
});

/* THEME AUTO */
const savedTheme = localStorage.getItem("theme");

if (savedTheme) {
    document.body.classList.toggle("dark", savedTheme === "dark");
} else {
    if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.body.classList.add("dark");
    }
}

/* ICÔNE INIT */
themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";

/* TOGGLE + ANIMATION */
function toggleTheme() {
    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");

    themeBtn.classList.add("rotate");
    setTimeout(() => themeBtn.classList.remove("rotate"), 400);

    themeBtn.textContent = isDark ? "☀️" : "🌙";

    localStorage.setItem("theme", isDark ? "dark" : "light");
}
</script>

</body>
</html>
