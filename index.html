<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMN</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DAMN">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#6a7d5e">
<meta name="color-scheme" content="light dark">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    color: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding-top: 80px;
    transition: 0.3s;
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center;
}

.bandeau h1 {
    margin: 0;
    color: white;
    font-size: 24px;
}

.open-btn {
    position: absolute;
    left: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* BOUTON THEME */
.theme-btn {
    position: absolute;
    right: 15px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    transition: transform 0.4s;
}

.theme-btn.rotate {
    transform: rotate(360deg) scale(1.2);
}

.theme-btn:active {
    transform: scale(0.85);
}

/* BOUTON PRINCIPAL */
.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 15px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 18px;
    transition: all 0.3s ease;
}

.btn:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: left 0.3s ease, box-shadow 0.3s;
    z-index: 1000;

    display: flex;
    flex-direction: column;
}

.sidebar.active {
    left: 0;
    box-shadow: 5px 0 20px rgba(0,0,0,0.4);
}

.sidebar-content {
    display: flex;
    flex-direction: column;
}

.sidebar a {
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    margin-bottom: 5px;
}

.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}

.sidebar .close-btn {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 30px;
    color: white;
    border: none;
    background: none;
    cursor: pointer;
}

/* COLOR PICKER */
.color-picker-container {
    padding: 15px;
    color: white;
    font-size: 14px;
}

.color-picker-container input {
    width: 100%;
    height: 35px;
    border: none;
    cursor: pointer;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
    z-index: 500;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* DARK MODE */
body.dark {
    background-color: #1e1e1e;
    color: white;
}

body.dark .bandeau {
    background-color: #2a2a2a;
}

body.dark .sidebar {
    background-color: #1f1f1f;
}

body.dark .btn {
    background: linear-gradient(90deg, #4facfe, #00f2fe);
}
</style>
</head>

<body>

<header class="bandeau">
    <h1>Bienvenue !</h1>
    <button class="open-btn" onclick="toggleSidebar()">☰</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</header>

<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<div id="sidebar" class="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">×</button>

    <div class="sidebar-content">
        <a href="index.html">Bienvenue !</a>
        <a href="./lesboutons.html">Les boutons de merde !</a>
        <a href="videodujour.html">Vidéos du jour</a>
        <a onclick="openContact()">Contact</a>
    </div>

    <div class="color-picker-container">
        🎨 Couleur sidebar
        <input type="color" id="colorPicker">
    </div>
</div>

<div id="content">
    <a href="./lesboutons.html" class="btn">
        LES BOUTONS DE MERDE !
    </a>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const themeBtn = document.getElementById("themeBtn");
const colorPicker = document.getElementById("colorPicker");

/* SIDEBAR */
function toggleSidebar() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

function closeSidebar() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
}

/* THEME */
const savedTheme = localStorage.getItem("theme");

if (savedTheme) {
    document.body.classList.toggle("dark", savedTheme === "dark");
} else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
    document.body.classList.add("dark");
}

themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";

function toggleTheme() {
    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");

    themeBtn.classList.add("rotate");
    setTimeout(() => themeBtn.classList.remove("rotate"), 400);

    themeBtn.textContent = isDark ? "☀️" : "🌙";

    localStorage.setItem("theme", isDark ? "dark" : "light");
}

/* COLOR PICKER */
const savedColor = localStorage.getItem("sidebarColor");

if (savedColor) {
    sidebar.style.backgroundColor = savedColor;
    colorPicker.value = savedColor;
}

colorPicker.addEventListener("input", function() {
    sidebar.style.backgroundColor = this.value;
    localStorage.setItem("sidebarColor", this.value);
});
</script>

</body>
</html>
