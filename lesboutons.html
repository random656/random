<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMN - Boutons</title>

<meta name="color-scheme" content="light dark">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    color: black;
    margin: 0;
    padding-top: 80px;
    transition: 0.3s;
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center;
}

.bandeau h1 {
    margin: 0;
    color: white;
    font-size: 24px;
}

/* BUTTON HEADER */
.open-btn {
    position: absolute;
    left: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

.theme-btn {
    position: absolute;
    right: 15px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    transition: transform 0.4s;
}

.theme-btn.rotate {
    transform: rotate(360deg) scale(1.2);
}

/* BUTTONS */
#content {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.btn {
    display: inline-block;
    padding: 12px 22px;
    margin: 10px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 14px; /* plus petit */
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn img {
    margin-right: 10px;
    width: 20px;
}

.btn:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 12px rgba(0,198,255,0.5);
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 1000;
    display: flex;
    flex-direction: column;
}

.sidebar.active {
    left: 0;
}

.sidebar a {
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    color: white;
}

.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}

.close-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* COLOR PICKER */
.color-picker-container {
    padding: 15px;
    color: white;
}

.color-picker-container input {
    width: 100%;
    height: 35px;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* DARK MODE */
body.dark {
    background-color: #1e1e1e;
    color: white;
}

body.dark .bandeau {
    background-color: #2a2a2a;
}

body.dark .sidebar {
    background-color: #1f1f1f;
}

body.dark .btn {
    background: linear-gradient(90deg, #4facfe, #00f2fe);
}

/* POPUP CONTACT */
.contact-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: white;
    padding: 35px;
    border-radius: 25px;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    opacity: 0;
    visibility: hidden;
    transition: 0.35s;
    z-index: 2000;
}

.contact-popup.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

.close-popup {
    position: absolute;
    top: 10px;   /* Positionné en haut à droite */
    right: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: #333;
    cursor: pointer;
}

/* Formulaire contact */
.contact-popup input,
.contact-popup textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

.contact-popup textarea {
    resize: none;
    height: 120px;
}

.contact-popup button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header class="bandeau">
    <h1>DES BOUTONS DE MERDE !</h1>
    <button class="open-btn" onclick="toggleSidebar()">☰</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</header>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="sidebar" class="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">×</button>
    <a href="index.html">Bienvenue !</a>
    <a href="lesboutons.html">Les boutons</a>
    <a href="videodujour.html">Vidéos du jour</a>
    <a href="javascript:void(0)" onclick="openContact()">Contact</a>

    <div class="color-picker-container">
        🎨 Couleur
        <input type="color" id="colorPicker">
    </div>
</div>

<div id="content">

    <a href="https://aubergefillot.github.io/joyeuxnoel/" target="_blank" class="btn">
        <img src="noel.png" alt="Noel">
        Joyeux Noël !
    </a>
    <a href="https://www.apple.com/fr/" target="_blank" class="btn">
        <img src="apple.png" alt="Apple">
        Apple
    </a>
    <a href="https://www.chatgpt.com" target="_blank" class="btn">
        <img src="chatgpt.png" alt="ChatGPT">
        Le chat il a pété
    </a>
    <a href="https://www.youtube.com" target="_blank" class="btn">
        <img src="ytb.png" alt="YouTube">
        YTB
    </a>
    <a href="https://www.google.com/search?q=fuck+you" target="_blank" class="btn">
        <img src="pi.png" alt="?">    
        ???
    </a>
    <a href="https://www.myinstants.com" target="_blank" class="btn">
        <img src="myinstants.png" alt="MyInstants">
        MyInstants
    </a>
    <a href="https://www.veck.io" target="_blank" class="btn">
        <img src="veckio.png" alt="Veck.io">
        Je veux du FPS
    </a>
    <a href="https://www.venge.io" target="_blank" class="btn">
        <img src="vengeio.png" alt="Venge.io">
        Re-venge ?
    </a>
    <a href="https://www.poki.com" target="_blank" class="btn">
        <img src="poki.png" alt="Poki">
        Ferme la porte y'a la Poki dans l'side
    </a>
    <a href="https://www.ikea.fr" target="_blank" class="btn">
        <img src="ikea.png" alt="Ikea">
        IKEA
    </a>
    <a href="https://www.boulanger.fr" target="_blank" class="btn">
        <img src="boulanger.png" alt="Boulanger">
        La boulangerie de la tech
    </a>

</div>

<!-- POPUP CONTACT -->
<div id="contactPopup" class="contact-popup">
    <button class="close-popup" onclick="closeContact()">✕</button>
    <h2>Contacte-moi</h2>
    <form id="contactForm">
        <input type="text" name="name" placeholder="Ton nom" required>
        <input type="email" name="email" placeholder="Ton email" required>
        <textarea name="message" placeholder="Ton message..." required></textarea>
        <input type="text" name="_gotcha" style="display:none">
        <button type="submit">Envoyer 🚀</button>
    </form>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const themeBtn = document.getElementById("themeBtn");
const colorPicker = document.getElementById("colorPicker");
const popup = document.getElementById("contactPopup");
const form = document.getElementById("contactForm");

/* SIDEBAR */
function toggleSidebar() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

function closeAll() {
    sidebar.classList.remove("active");
    popup.classList.remove("active");
    overlay.classList.remove("active");
}

/* ESC */
document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeAll();
});

/* THEME */
const savedTheme = localStorage.getItem("theme");

if (savedTheme) {
    document.body.classList.toggle("dark", savedTheme === "dark");
} else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
    document.body.classList.add("dark");
}

themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";

function toggleTheme() {
    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");

    themeBtn.classList.add("rotate");
    setTimeout(() => themeBtn.classList.remove("rotate"), 400);

    themeBtn.textContent = isDark ? "☀️" : "🌙";

    localStorage.setItem("theme", isDark ? "dark" : "light");
}

/* COLOR PICKER */
const savedColor = localStorage.getItem("sidebarColor");

if (savedColor) {
    sidebar.style.backgroundColor = savedColor;
    colorPicker.value = savedColor;
}

colorPicker.addEventListener("input", function() {
    sidebar.style.backgroundColor = this.value;
    localStorage.setItem("sidebarColor", this.value);
});

/* POPUP CONTACT */
function openContact() {
    popup.classList.add("active");
    overlay.classList.add("active");
}

function closeContact() {
    popup.classList.remove("active");
    overlay.classList.remove("active");
}

form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const data = new FormData(form);

    await fetch("https://formspree.io/f/xnjbywdk", {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
    });

    form.reset();
    closeContact();
    alert("Message envoyé !");
});
</script>

</body>
</html>
