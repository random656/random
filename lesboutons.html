<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMN - Boutons</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    color: black;
    margin: 0;
    padding-top: 120px;
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
    color: white;
}

.open-btn {
    position: absolute;
    left: 15px;
    top: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* BUTTONS */
.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 15px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}

/* CONTENT */
#content {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 1000;
    display: flex;
    flex-direction: column;
}

.sidebar.active {
    left: 0;
}

.sidebar a {
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    display: block;
}

.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}

.close-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}
</style>
</head>

<body>

<header class="bandeau">
