<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAMN</title>

<meta name="color-scheme" content="light dark">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    color: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding-top: 80px;
    transition: 0.3s;
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center;
}

.open-btn {
    position: absolute;
    left: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* BOUTON THEME */
.theme-btn {
    position: absolute;
    right: 15px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    transition: transform 0.4s;
}

.theme-btn.rotate {
    transform: rotate(360deg) scale(1.2);
}

.theme-btn:active {
    transform: scale(0.85);
}

/* BOUTONS */
.btn {
    display: inline-block;
    padding: 15px 30px;
    margin: 15px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    border-radius: 12px;
    text-decoration: none;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: -260px;
    top: 0;
    width: 260px;
    height: 100%;
    background: #333;
    transition: 0.3s;
    padding-top: 60px;
    z-index: 1000;
}

.sidebar.active {
    left: 0;
}

.sidebar a {
    display: block;
    padding: 12px;
    color: white;
}

.close-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* POPUP */
.contact-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: white;
    padding: 30px;
    border-radius: 20px;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.contact-popup.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

/* TOAST */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #3a7bd5;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    transition: 0.3s;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* DARK MODE */
body.dark {
    background: #1e1e1e;
    color: white;
}

body.dark .bandeau {
    background: #2a2a2a;
}

body.dark .sidebar {
    background: #1f1f1f;
}

body.dark .contact-popup {
    background: #2b2b2b;
}
</style>
</head>

<body>

<header class="bandeau">
    <h1>DES BOUTONS DE MERDE !</h1>
    <button class="open-btn" onclick="toggleSidebar()">☰</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</header>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="sidebar" class="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">×</button>
    <a href="index.html">Accueil</a>
    <a href="lesboutons.html">Boutons</a>
    <a onclick="openContact()">Contact</a>
</div>

<div id="content">
    <!-- BOUTONS EXEMPLES -->
    <button class="btn" onclick="showToast('💥 Boom !')">Bouton 1</button>
    <button class="btn" onclick="showToast('😂 Haha !')">Bouton 2</button>
    <button class="btn" onclick="showToast('🚀 Go !')">Bouton 3</button>
</div>

<div id="toast" class="toast"></div>

<div id="contactPopup" class="contact-popup">
    <button onclick="closeContact()">✕</button>
    <h2>Contact</h2>
    <form id="contactForm">
        <input type="text" required placeholder="Nom">
        <input type="email" required placeholder="Email">
        <textarea required placeholder="Message"></textarea>
        <button type="submit">Envoyer</button>
    </form>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const popup = document.getElementById("contactPopup");
const toast = document.getElementById("toast");
const form = document.getElementById("contactForm");
const themeBtn = document.getElementById("themeBtn");

/* SIDEBAR */
function toggleSidebar() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

function closeAll() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    closeContact();
}

/* CONTACT */
function openContact() {
    popup.classList.add("active");
    overlay.classList.add("active");
}

function closeContact() {
    popup.classList.remove("active");
    overlay.classList.remove("active");
}

/* TOAST */
function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
}

/* FORM */
form.addEventListener("submit", function(e) {
    e.preventDefault();
    showToast("✅ Envoyé !");
    form.reset();
    closeContact();
});

/* THEME */
const savedTheme = localStorage.getItem("theme");

if (savedTheme) {
    document.body.classList.toggle("dark", savedTheme === "dark");
} else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
    document.body.classList.add("dark");
}

themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";

function toggleTheme() {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");

    themeBtn.classList.add("rotate");
    setTimeout(() => themeBtn.classList.remove("rotate"), 400);

    themeBtn.textContent = isDark ? "☀️" : "🌙";

    localStorage.setItem("theme", isDark ? "dark" : "light");
}
</script>

</body>
</html>
