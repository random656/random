<!DOCTYPE html>

<head>

<title>DAMN - Boutons</title>

<meta name="color-scheme" content="light dark">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #6a7d5e;
    color: black;
    margin: 0;
    padding-top: 80px;
    transition: 0.3s;
}

/* HEADER */
.bandeau {
    width: 100%;
    background-color: #6a7d5e;
    padding: 20px 0;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;

    display: flex;
    align-items: center;
    justify-content: center;
}

.bandeau h1 {
    margin: 0;
    color: white;
    font-size: 24px;
}

/* BUTTON HEADER */
.open-btn {
    position: absolute;
    left: 15px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

.theme-btn {
    position: absolute;
    right: 15px;
    font-size: 22px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    transition: transform 0.4s;
}

.theme-btn.rotate {
    transform: rotate(360deg) scale(1.2);
}

/* BUTTONS */
#content {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.btn {
    display: inline-block;
    padding: 12px 22px;
    margin: 10px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 14px; /* plus petit */
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn img {
    margin-right: 10px;
    width: 20px;
}

.btn:hover {
    filter: brightness(1.1);
    box-shadow: 0 0 12px rgba(0,198,255,0.5);
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 260px;
    position: fixed;
    left: -260px;
    top: 0;
    background-color: #333;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 1000;
    display: flex;
    flex-direction: column;
}

.sidebar.active {
    left: 0;
}

.sidebar a {
    padding: 12px 20px;
    text-decoration: none;
    font-size: 18px;
    color: white;
}

.sidebar a:hover {
    background-color: rgba(255,255,255,0.2);
}

.close-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 30px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
}

/* COLOR PICKER */
.color-picker-container {
    padding: 15px;
    color: white;
}

.color-picker-container input {
    width: 100%;
    height: 35px;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* DARK MODE */
body.dark {
    background-color: #1e1e1e;
    color: white;
}

body.dark .bandeau {
    background-color: #2a2a2a;
}

body.dark .sidebar {
    background-color: #1f1f1f;
}

body.dark .btn {
    background: linear-gradient(90deg, #4facfe, #00f2fe);
}

/* POPUP CONTACT */
.contact-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: white;
    padding: 35px;
    border-radius: 25px;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    opacity: 0;
    visibility: hidden;
    transition: 0.35s;
    z-index: 2000;
}

.contact-popup.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

.close-popup {
    position: absolute;
    top: 15px;
    right: 18px;
    border: none;
    background: none;
    font-size: 20px;
    cursor: pointer;
}

.contact-popup input,
.contact-popup textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

.contact-popup textarea {
    resize: none;
    height: 120px;
}

.contact-popup button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #00c6ff, #3a7bd5);
    color: white;
    cursor: pointer;
}
</style>
</head>
